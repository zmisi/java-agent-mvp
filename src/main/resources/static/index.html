<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>DB Agent</title>
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("db-agent-ui-settings") || "{}");
        document.documentElement.dataset.theme = s.theme || "system";
        if (s.fontSize) document.documentElement.style.setProperty("--font-size-base", s.fontSize + "px");
      } catch (e) { /* ignore */ }
    })();
  </script>
  <link rel="stylesheet" href="/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="app" id="appRoot" data-workspace="chat">
  <aside class="sidebar">
    <div class="sidebar-actions">
      <button id="newChat" type="button" class="sidebar-action" title="New chat">
        <svg class="sidebar-action-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8 5.5V10.5M5.5 8h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span class="sidebar-action-label">New Chat</span>
      </button>
      <button id="createReleaseBtn" type="button" class="sidebar-action" title="New DB release from design doc">
        <svg class="sidebar-action-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 4.5h10M3 8h10M3 11.5h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M12 2.5v3M10.5 4h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span class="sidebar-action-label">New DB Release</span>
      </button>
      <button id="createDbProvisioningBtn" type="button" class="sidebar-action" title="New DB provisioning">
        <svg class="sidebar-action-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2.5c2.8 0 5 1 5 2.3S10.8 7 8 7 3 6 3 4.8s2.2-2.3 5-2.3Z" stroke="currentColor" stroke-width="1.2"/>
          <path d="M3 4.8v3.4c0 1.2 2.2 2.3 5 2.3s5-1 5-2.3V4.8M3 8.2v3c0 1.2 2.2 2.3 5 2.3s5-1 5-2.3v-3" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span class="sidebar-action-label">New DB Provisioning</span>
      </button>
    </div>

    <div class="sidebar-nav">
      <section class="sidebar-group" id="chatSection" data-section="chat">
        <div class="sidebar-group-label">Chats</div>
        <div id="sessionList" class="sidebar-list"></div>
      </section>

      <section class="sidebar-group" id="releaseSection" data-section="releases">
        <div class="sidebar-group-label">DB Releases</div>
        <div id="releaseSidebarList" class="sidebar-list"></div>
      </section>

      <section class="sidebar-group" id="dbProvisioningSection" data-section="db-provisioning">
        <div class="sidebar-group-label">DB Provisioning</div>
        <div id="dbProvisioningSidebarList" class="sidebar-list">
          <div class="sidebar-list-empty">No provisioning yet</div>
        </div>
      </section>
    </div>

    <div class="sidebar-footer">
      <button id="openSettings" type="button" class="sidebar-action sidebar-action-footer" title="Settings">
        <svg class="sidebar-action-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.2"/>
          <path d="M12.5 8.8c.1-.5.1-1.1 0-1.6l1.2-.9a.5.5 0 0 0 .1-.6l-1.1-1.9a.5.5 0 0 0-.6-.2l-1.4.6a6.5 6.5 0 0 0-1.4-.8L9.6 1.5a.5.5 0 0 0-.5-.5H6.9a.5.5 0 0 0-.5.5l-.2 1.4a6.5 6.5 0 0 0-1.4.8l-1.4-.6a.5.5 0 0 0-.6.2L1.3 5.7a.5.5 0 0 0 .1.6l1.2.9c-.1.5-.1 1.1 0 1.6l-1.2.9a.5.5 0 0 0-.1.6l1.1 1.9a.5.5 0 0 0 .6.2l1.4-.6c.4.3.9.6 1.4.8l.2 1.4a.5.5 0 0 0 .5.5h2.2a.5.5 0 0 0 .5-.5l.2-1.4c.5-.2 1-.5 1.4-.8l1.4.6a.5.5 0 0 0 .6-.2l1.1-1.9a.5.5 0 0 0-.1-.6l-1.2-.9Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
        </svg>
        <span class="sidebar-action-label">Settings</span>
      </button>
    </div>
  </aside>

  <div class="workspace-root">
    <main id="chatView" class="workspace workspace-chat" aria-label="Chat">
      <header class="workspace-header">
        <div id="sessionTitle" class="workspace-title">Select or create a chat</div>
      </header>
      <section id="messages" class="messages"></section>
      <footer class="composer">
        <div class="composer-inner">
          <textarea id="input" rows="1" placeholder="Ask about the database… (⌘+Enter to send)"></textarea>
          <button id="send" type="button" class="btn btn-send" disabled title="Send">
            <svg class="icon-send" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M3.5 9h11M9.5 4.5 15 9l-5.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="stop" type="button" class="btn btn-stop" hidden title="Stop">
            <svg class="icon-stop" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <rect x="5" y="5" width="8" height="8" rx="1.5" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </footer>
    </main>

    <main id="releasesView" class="workspace workspace-releases" aria-label="DB Release" hidden>
      <header class="workspace-header workspace-header-releases">
        <div class="workspace-header-text">
          <h1 class="workspace-heading">DB Release</h1>
          <p id="releaseDetailSubtitle" class="workspace-subtitle">Select a release from the sidebar</p>
        </div>
      </header>
      <section id="releasesPanel" class="releases-workspace-body"></section>
    </main>
  </div>
</div>

<div id="sessionMenu" class="dropdown-menu" role="menu" hidden></div>

<div id="settingsBackdrop" class="modal-backdrop" hidden></div>
<div id="settingsPanel" class="modal-panel" role="dialog" aria-labelledby="settingsTitle" hidden>
  <div class="modal-header">
    <h2 id="settingsTitle">Settings</h2>
    <button type="button" class="btn btn-icon" id="closeSettings" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
        <path d="M3 3l8 8M11 3 3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="modal-body">
    <section class="setting-group">
      <label class="setting-label" for="themeSelect">Appearance</label>
      <select id="themeSelect" class="setting-control">
        <option value="system">System</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
      <p class="setting-hint">Follows macOS light/dark mode when set to System.</p>
    </section>
    <section class="setting-group">
      <label class="setting-label" for="fontSizeSelect">Font size</label>
      <select id="fontSizeSelect" class="setting-control">
        <option value="12">12 px</option>
        <option value="13">13 px</option>
        <option value="14" selected>14 px (default)</option>
        <option value="15">15 px</option>
        <option value="16">16 px</option>
        <option value="18">18 px</option>
      </select>
    </section>
  </div>
</div>

<div id="releaseModalBackdrop" class="modal-backdrop" hidden></div>
<div id="releaseModal" class="modal-panel modal-panel-wide" role="dialog" aria-labelledby="releaseModalTitle" hidden>
  <div class="modal-header">
    <h2 id="releaseModalTitle">New DB Release</h2>
    <button type="button" class="btn btn-icon" id="closeReleaseModal" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
        <path d="M3 3l8 8M11 3 3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="modal-body">
    <section class="setting-group">
      <label class="setting-label" for="releaseTitleInput">Release title</label>
      <input id="releaseTitleInput" type="text" class="setting-control" required placeholder="REL-20260524-acd27f"/>
    </section>
    <section class="setting-group">
      <label class="setting-label">Upload design doc</label>
      <div id="designDocDropzone" class="upload-dropzone" tabindex="0" role="button" aria-label="Upload markdown design document">
        <span class="upload-dropzone-text">Drop a .md file here, or click to browse</span>
        <input id="releaseDesignDocUpload" type="file" accept=".md,text/markdown" hidden/>
      </div>
      <p id="designDocUploadStatus" class="setting-hint" hidden></p>
    </section>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancelReleaseModal">Cancel</button>
      <button type="button" class="btn btn-new" id="confirmReleaseModal" disabled>Create release</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script src="/releases.js"></script>
</body>
</html>
