logging:
  level:
    com.alibaba.cloud.ai.dashscope: INFO
    com.alibaba.cloud.ai.dashscope.api: INFO
    com.alibaba.cloud.ai.dashscope.chat: INFO
    org.springframework.ai.chat.client: INFO
    org.springframework.ai.chat.model: INFO
    org.springframework.ai.model.tool: INFO
    org.springframework.ai.mcp: INFO
    org.springframework.web.client.RestClient: INFO

app:
  db-agent:
    chat-target: chat-readonly
    targets:
      chat-readonly:
        type: mcp
        servers:
          - admission-score

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
  datasource:
    url: jdbc:postgresql://postgres:5432/employees
    username: agent
    password: agent

  ai:
    model:
      chat: dashscope
      embedding: dashscope
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
          temperature: 0.0
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
    mcp:
      client:
        stdio:
          servers-configuration: classpath:/mcp-servers-config.docker.json
