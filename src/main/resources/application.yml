app:
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    web-login-secret: ${WEB_LOGIN_SECRET:}
    web-login-openid: ${WEB_LOGIN_OPENID:web:console}
    jwt-secret: ${WECHAT_JWT_SECRET:replace-this-with-env-secret}
    jwt-issuer: wechat-mini-program
    token-ttl-seconds: 86400
    session-idle-seconds: 3600
    session-max-seconds: 86400
    # 访客使用限制：仅统计授权登录次数（guest-login-limit）
    guest-quota-limit: 10
    guest-login-limit: 10
    # 同一 IP 每分钟最多调用微信登录接口次数
    login-rate-limit-per-minute: 30
    avatar-upload-dir: ${WECHAT_AVATAR_UPLOAD_DIR:./data/wechat-avatars}
    # 逗号分隔多个 openid，例如: oAbc123,oDef456
    bootstrap-admin-openids: ${WECHAT_BOOTSTRAP_ADMIN_OPENIDS:}
  db-agent:
    chat-target: chat-readonly
    targets:
      chat-readonly:
        type: mcp
        servers:
          - admission-score
  agent:
    prompt:
      # System prompt file (Markdown/plain text). Edit without recompiling Java.
      location: classpath:prompts/db-agent-system.md
      # Replaces {schema} placeholders in the prompt file
      schema: emp
  chat:
    memory:
      # Sliding window of USER/ASSISTANT/TOOL messages per conversation (model context)
      max-messages: 30
    compaction:
      # model: one LLM call to build Compact brief; rules: deterministic fallback
      summary-mode: model
      fallback-to-rules-on-failure: true
      prompt-location: classpath:prompts/compaction-system.md
      transcript-message-limit: 3
      turn-summary-limit: 24
      max-chars-per-message: 6000
      temperature: 0
    # Declared input budget for UI % (tune to your model; observability only)
    context-window:
      max-input-tokens: 16384
  rag:
    enabled: true
    rebuild-on-startup: false
    clear-before-rebuild: false
    vector-schema-name: agent_ui
    vector-table-name: rag_vector_store
    document-location-pattern: classpath:/rag-docs/**/*.md
    top-k: 4
    max-distance: 0.70
    route-database-queries: true
    context-addon: >
      仅当用户消息中已注入知识库检索上下文时，才用这些资料回答招生简章、招生政策、章程规则，
      以及 RAG、Spring AI 或本项目文档类问题。数据库表结构、SQL、统计类问题必须用 MCP 工具查询 PostgreSQL。
      用高考分数查询可报专业/院校：必须调用 MCP 工具 getMajorByScore（必填 score、province；
      可选 year、subject_group、campus、admission_type），不要根据知识库片段编造专业列表。
      只需用用户实际分数调用一次，禁止自行多次调用不同分数；系统按各专业最低分与用户分数比较自动分冲（需+15才够）/稳（分数正好够）/保（-15仍够）三档，客户端固定展示三段表格。
    routing:
      # 命中任一条即跳过 RAG，走 MCP（SQL 或 getMajorByScore）。优先于 rag-patterns。Java 正则，不区分大小写。
      database-patterns:
        - '\b(list|show|describe|desc)\b[\s\S]{0,40}\btables?\b|\btables?\b[\s\S]{0,20}\b(list|show|all)\b'
        - '\b(information_schema|table_schema|table_name|column_name)\b'
        - '\b(schema|column|columns|row|rows|record|records)\b'
        - '\b(select|insert|update|delete|from|where|join|group by|order by)\b'
        - '\b(employee|department|salary|title|postgres|postgresql|sql|database|db)\b'
        - '\b(how many|count|aggregate|sum|avg|max|min)\b'
        - '数据库|数据表|表结构|表名|列名|员工|部门|薪资|统计'
        - '\d{3,4}\s*分[\s\S]{0,60}(专业|报考|报志愿|志愿|可报|能上|录取|哪些|什么|报什么|能上什么)'
        - '(?<!\d)\d{3,4}(?!\d)[\s\S]{0,80}(专业|报考|报志愿|志愿|可报|能上|录取|哪些|什么|报什么|能上什么|什么专业)'
        - '(专业|报考|报志愿|志愿|可报|能上|录取|什么专业|哪些专业|什么学校)[\s\S]{0,80}(?<!\d)\d{3,4}(?!\d)'
        - '(专业|报考|报志愿|志愿|可报|能上|录取)[\s\S]{0,60}\d{3,4}\s*分'
        - '(多少|几分|考了|高考)\s*\d{3,4}\s*分[\s\S]{0,40}(专业|学校|院校|报|志愿)'
      # 命中任一条即走 RAG 知识库（招生简章、政策、章程等）。Java 正则，不区分大小写。
      rag-patterns:
        - '\brag\b'
        - 'spring\s*ai|questionansweradvisor|simplevectorstore|embedding|vector\s*store'
        - '微调|知识库|向量|检索增强|文档问答'
        - '招生简章|招生章程|录取规则|招生政策|录取办法|投档规则|体检要求|加分政策|转专业|专项计划|振兴计划|高校专项|国家专项|地方专项|中外合作|专升本|招生计划'
    admissions:
      # 对招生简章/政策类问题，若用户未点名学校，则对 app.rag.admissions.schools 各校分别检索并合并。
      enabled: true
      intent-keywords: [ '招生简章', '招生章程', '章程', '简章', '政策', '规则', '专项', '转专业', '体检', '投档', '招生计划' ]
      per-school-top-k: 4
      total-top-k: 12
      answer-format-template: |
        回答格式要求（必须遵守）：
        1. 根据知识库检索到的招生简章、章程或政策内容回答；注明资料来源文件名。
        2. 多校对比时按学校分组输出，标题使用学校中文全称。
        3. 仅根据上下文回答，不得编造；上下文中没有的信息应明确说明。
        4. 缺少年份、校区、招生类型等关键信息时，向用户追问。
      schools:
        - key: hfut
          display-name: 合肥工业大学
          aliases: [ 合工大, 合肥工业大学, HFUT ]
          path-contains: [ '/hfut/', 'hfut/' ]
        - key: hfuu
          display-name: 合肥大学
          aliases: [ 合肥大学, HFUU ]
          path-contains: [ '/hfuu/', 'hfuu/' ]
        - key: aust
          display-name: 安徽理工大学
          aliases: [ 安理工, 安徽理工大学, AUST ]
          path-contains: [ '/aust/', 'aust/' ]
        - key: ahau
          display-name: 安徽农业大学
          aliases: [ 安农大, 安徽农业大学, AHAU ]
          path-contains: [ '/ahau/', 'ahau/' ]
        - key: ahut
          display-name: 安徽工业大学
          aliases: [ 安工大, 安徽工业大学, AHUT ]
          path-contains: [ '/ahut/', 'ahut/' ]
        - key: ahu
          display-name: 安徽大学
          aliases: [ 安大, 安徽大学, AHU ]
          path-contains: [ '/ahu/', 'ahu/' ]
    hybrid:
      enabled: true
      vector-top-k-multiplier: 2
      lexical-top-k-multiplier: 3
      fusion-top-k-multiplier: 3
      rrf-k: 60
      vector-weight: 1.0
      lexical-weight: 0.9
      # auto | pgroonga | postgres-fts
      lexical-engine: auto
      fts-dictionary: simple

logging:
  level:
    com.example.javaagentmvp.web.ApiAccessLogFilter: INFO
    com.example.javaagentmvp.web.AdmissionController: INFO
    org.flywaydb: INFO
    com.example.javaagentmvp.rag: INFO
    com.example.javaagentmvp.rag.RagFlowLoggingAdvisor: INFO
    com.example.javaagentmvp.rag.RagFlowStartAdvisor: INFO
    com.example.javaagentmvp.rag.RagRetrievalService: INFO
    com.example.javaagentmvp.QwenApiLoggingAdvisor: INFO
    com.alibaba.cloud.ai.dashscope: DEBUG
    com.alibaba.cloud.ai.dashscope.api: DEBUG
    com.alibaba.cloud.ai.dashscope.chat: DEBUG
    org.springframework.ai.chat.client: DEBUG
    org.springframework.ai.chat.model: DEBUG
    org.springframework.ai.model.tool: DEBUG
    org.springframework.ai.mcp: DEBUG
    org.springframework.web.client.RestClient: DEBUG

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.javaagentmvp.chat.persistence.model
  configuration:
    map-underscore-to-camel-case: true

spring:
  profiles:
    default: local

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/employees
    username: ${AGENT_UI_DB_USER}
    password: ${AGENT_UI_DB_PASSWORD}
    hikari:
      connection-init-sql: SET search_path TO agent_ui;
      maximum-pool-size: 8

  flyway:
    enabled: true
    create-schemas: true
    schemas: agent_ui
    default-schema: agent_ui
    locations: classpath:db/migration

  ai:
    model:
      # Selected by profile-specific files (application-local.yml / application-online.yml)
      chat: ${APP_AI_CHAT_MODEL_PROVIDER:ollama}
      embedding: ${APP_AI_EMBEDDING_MODEL_PROVIDER:ollama}
    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: agent_ui
        table-name: rag_vector_store

    # MCP Client configuration
    mcp:
      client:
        enabled: true
        name: opstream-agent
        version: 1.0.0
        type: SYNC
        request-timeout: 30s
        stdio:
          servers-configuration: classpath:/mcp-servers-config.json
        toolcallback:
          enabled: true      # Auto register MCP as Spring AI Tool

server:
  port: 8080
