services:
  postgres:
    image: m.daocloud.io/docker.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: employees
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d employees"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: m.daocloud.io/docker.io/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  admissions-init:
    build:
      context: ../data-collection
      dockerfile: Dockerfile.db-init
      args:
        BASE_IMAGE: m.daocloud.io/docker.io/python:3.12-slim
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/employees
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: java-agent-mvp/Dockerfile
      args:
        BASE_IMAGE: m.daocloud.io/docker.io/eclipse-temurin:21-jdk
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?Set DASHSCOPE_API_KEY in .env}
      WECHAT_APP_ID: ${WECHAT_APP_ID:?Set WECHAT_APP_ID in .env}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?Set WECHAT_APP_SECRET in .env}
      WECHAT_JWT_SECRET: ${WECHAT_JWT_SECRET:?Set WECHAT_JWT_SECRET in .env}
      WECHAT_BOOTSTRAP_ADMIN_OPENIDS: ${WECHAT_BOOTSTRAP_ADMIN_OPENIDS:-}
      WEB_LOGIN_SECRET: ${WEB_LOGIN_SECRET:-}
      WEB_LOGIN_OPENID: ${WEB_LOGIN_OPENID:-web:console}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318/v1/traces}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      admissions-init:
        condition: service_completed_successfully

  jaeger:
    profiles: ["observability"]
    image: m.daocloud.io/docker.io/jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    profiles: ["observability"]
    image: m.daocloud.io/docker.io/prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
