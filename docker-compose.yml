services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: employees
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d employees"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  admissions-init:
    build:
      context: ../data-collection
      dockerfile: Dockerfile.db-init
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/employees
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: java-agent-mvp/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?Set DASHSCOPE_API_KEY in .env or the shell}
    depends_on:
      postgres:
        condition: service_healthy
      admissions-init:
        condition: service_completed_successfully
